# --- Font Configuration ---
font_size 14.0
font_family JetBrainsMono Nerd Font

enable_audio_bell no

# open new split terminal in the same directory
map ctrl+shift+enter new_window_with_cwd

# open new tab from cwd
map ctrl+shift+t launch --cwd=current --type=tab --location=neighbor

# --- Window Decorations & Behavior ---
# Hides the title bar for the minimalist Hyper look
hide_window_decorations yes
# Adds internal padding for better readability
# Ensures the content stays centered
placement_strategy center

# --- Oh-Lucy-Evening Palette ---
background           #1E1D23
foreground           #DED7D0
selection_background #CFD0D7
selection_foreground #1A1B1F

# --- Cursor & Interaction ---
cursor                #DFE0EA
cursor_text_color     background
cursor_shape          beam
cursor_blink_interval 0.5
copy_on_select        yes

# --- Tab Bar (Bottom Aligned & Diamond/Slant) ---
tab_bar_edge       bottom
tab_bar_style      slant
tab_bar_min_tabs   1
tab_bar_align      left
tab_bar_background #1E1D23

# Active Tab
active_tab_background   #E85A84
active_tab_foreground   #DFE0EA
active_tab_font_style   bold

# Inactive Tab
inactive_tab_background #342D3B
inactive_tab_foreground #CFD0D7
inactive_tab_font_style italic

# --- Terminal Colors (Oh-Lucy-Evening) ---
# Black
color0  #938884
color8  #938884
# Red
color1  #FF7DA3
color9  #FF7DA3
# Green
color2  #7EC49D
color10 #7EC49D
# Yellow
color3  #EFD472
color11 #EFD472
# Blue
color4  #8BB8D0
color12 #8BB8D0
# Magenta
color5  #BDA9D4
color13 #BDA9D4
# Cyan
color6  #BDA9D4
color14 #BDA9D4
# White
color7  #DED7D0
color15 #DED7D0

# --- Keybindings ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+h show_scrollback
map ctrl+shift+w close_tab
map ctrl+shift+left prev_tab
map ctrl+shift+right next_tab

# Font size adjustments
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
